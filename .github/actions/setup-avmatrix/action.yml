name: Setup AVmatrix
description: Setup Node.js 20 plus Go, install dependencies, and optionally build

inputs:
  build:
    description: Whether to run npm run build after install
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: avmatrix/package-lock.json

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum

    - name: Build avmatrix-shared
      run: npm install && npm run build
      shell: bash
      working-directory: avmatrix-shared

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: avmatrix

    - name: Build
      if: ${{ inputs.build == 'true' }}
      run: npm run build
      shell: bash
      working-directory: avmatrix
