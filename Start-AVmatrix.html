<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Start AVmatrix</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #11161b;
        color: #f3f7f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #11161b;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        display: grid;
        gap: 18px;
        justify-items: stretch;
      }

      h1 {
        margin: 0 0 6px;
        text-align: center;
        font-size: 34px;
        line-height: 1.1;
        font-weight: 760;
        letter-spacing: 0;
      }

      button {
        min-height: 56px;
        width: 100%;
        border: 1px solid #75d7bf;
        border-radius: 8px;
        background: #75d7bf;
        color: #071310;
        font-size: 17px;
        font-weight: 740;
        letter-spacing: 0;
        cursor: pointer;
      }

      button:hover {
        background: #92e5d2;
      }

      button.secondary {
        border-color: #53616a;
        background: #1d272f;
        color: #f3f7f8;
      }

      button.secondary:hover {
        background: #27343e;
      }

      button:active {
        transform: translateY(1px);
      }

      p {
        min-height: 22px;
        margin: 0;
        text-align: center;
        color: #aeb8bd;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AVmatrix</h1>
      <button id="start" type="button">Start AVmatrix</button>
      <button id="reset" class="secondary" type="button">Reset</button>
      <p id="status" aria-live="polite"></p>
    </main>

    <script>
      const statusText = document.getElementById('status');

      document.getElementById('start').addEventListener('click', () => {
        statusText.textContent = 'Starting AVmatrix...';
        window.location.href = 'avmatrix://start';
      });

      document.getElementById('reset').addEventListener('click', () => {
        statusText.textContent = 'Stopping AVmatrix runtime...';
        window.location.href = 'avmatrix://reset';
      });
    </script>
  </body>
</html>
